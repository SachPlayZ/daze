name: Deploy bot

on:
  push:
    branches: [main]
    paths:
      - "apps/bot/**"
      - "packages/db/**"
      - "packages/telegram/**"
      - ".github/workflows/deploy-bot.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: cd ~/daze && git fetch origin main && git reset --hard origin/main && bash apps/bot/deploy.sh
